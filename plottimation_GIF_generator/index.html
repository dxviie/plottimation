<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>p5 + OpenCV (no WASM) + GIF</title>

    <!-- p5.js -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/p5.js"></script>

    <!-- OpenCV.js (WASM-free asm.js build) -->
    <!-- This version of OpenCV.js (from Huningxin’s GitHub) is a 
    self-contained asm.js build — it embeds all compiled code directly 
    in JavaScript and does not rely on loading an external .wasm file, 
    which makes it compatible with HTTPS sandboxed environments like 
    editor.p5js.org and OpenProcessing. -->
    <script src="https://huningxin.github.io/opencv.js/build/asm.js/opencv.js"></script>

    <!-- gif.js -->
    <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main></main>
    <script src="sketch.js"></script>
  </body>
</html>
