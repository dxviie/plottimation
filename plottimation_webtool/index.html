<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plottimation Web Tool</title>
    <link rel="stylesheet" href="style.css" />
    <script src="opencv.js"></script>
    <script src="gif.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="control-panel">
        <div class="panel-head">
          <h1>Plottimation Tool</h1>
          <p class="lede">
            Build an animated GIF from a photo of a frame-sheet.
          </p>
        </div>

        <section class="control-group">
          <h2>Photo</h2>
          <label id="dropZone" class="drop-zone" for="fileInput">
            <span>Drop a photo or scan here</span>
            <span>or click to choose a file</span>
          </label>
          <input id="fileInput" type="file" accept="image/*" />
        </section>

        <details class="control-group collapsible">
          <summary>Layout</summary>
          <div class="field-grid">
            <label>
              <span>Sheet Width</span>
              <input id="paperWidth" type="number" min="1" step="0.1" value="11" />
            </label>
            <label>
              <span>Sheet Height</span>
              <input id="paperHeight" type="number" min="1" step="0.1" value="8.5" />
            </label>
            <label>
              <span>Frame Columns</span>
              <input id="frameCols" type="number" min="1" step="1" value="5" />
            </label>
            <label>
              <span>Frame Rows</span>
              <input id="frameRows" type="number" min="1" step="1" value="4" />
            </label>
          </div>
        </details>

        <details class="control-group collapsible">
          <summary>Detection</summary>
          <div class="slider-stack">
            <label>
              <span>Cross Region Size <output id="crossRoiScaleValue">25 px</output></span>
              <input id="crossRoiScale" type="range" min="30" max="150" step="1" value="60" />
            </label>
          </div>
        </details>

        <details class="control-group collapsible">
          <summary>Alignment</summary>
          <label class="toggle">
            <input id="useCrossAlignment" type="checkbox" checked />
            <span>Use cross-based subpixel alignment</span>
          </label>
          <label class="toggle">
            <input id="useRectifiedAsSource" type="checkbox" checked />
            <span>Use rectified as source</span>
          </label>
        </details>

        <details class="control-group collapsible">
          <summary>Trim Output</summary>
          <div class="field-grid">
            <label>
              <span>Crop Left</span>
              <input id="cropLeft" type="number" min="0" step="1" value="0" />
            </label>
            <label>
              <span>Crop Right</span>
              <input id="cropRight" type="number" min="0" step="1" value="0" />
            </label>
            <label>
              <span>Crop Top</span>
              <input id="cropTop" type="number" min="0" step="1" value="0" />
            </label>
            <label>
              <span>Crop Bottom</span>
              <input id="cropBottom" type="number" min="0" step="1" value="0" />
            </label>
          </div>
        </details>

        <details class="control-group collapsible">
          <summary>Appearance</summary>
          <div class="slider-stack">
            <label>
              <span>Brightness <output id="brightnessValue">+0</output></span>
              <input id="brightness" type="range" min="-100" max="100" step="1" value="0" />
            </label>
            <label>
              <span>Contrast <output id="contrastValue">+0</output></span>
              <input id="contrast" type="range" min="-100" max="100" step="1" value="0" />
            </label>
            <label>
              <span>Saturation <output id="saturationValue">+0</output></span>
              <input id="saturation" type="range" min="-100" max="100" step="1" value="0" />
            </label>
          </div>
        </details>

        <details class="control-group collapsible">
          <summary>Playback</summary>
          <div class="field-grid">
            <label>
              <span>Frame Rate</span>
              <input id="fps" type="number" min="1" max="60" step="1" value="20" />
            </label>
          </div>
        </details>

        <section class="control-group status-group">
          <h2>Status</h2>
          <pre id="statusText">Waiting for OpenCV…</pre>
        </section>
      </aside>

      <main class="workspace">
        <section class="viewer-card">
          <header>
            <h2>Raw Photo <span id="rawPhotoName" class="header-note"></span></h2>
          </header>
          <div class="viewer-stage">
            <canvas id="rawCanvas"></canvas>
          </div>
        </section>

        <section class="viewer-card">
          <header>
            <h2>Rectified Sheet</h2>
          </header>
          <div class="viewer-stage">
            <canvas id="rectifiedCanvas"></canvas>
          </div>
        </section>

        <section class="viewer-card">
          <header>
            <h2>Cross Regions</h2>
          </header>
          <div id="crossRoiGrid" class="cross-roi-grid"></div>
        </section>

        <section class="viewer-card">
          <header>
            <h2>Animation Preview</h2>
            <button id="exportButton" class="header-button" type="button" disabled>Export GIF</button>
          </header>
          <div class="output-preview">
            <canvas id="gifPreviewCanvas"></canvas>
            <img id="gifImage" alt="Exported GIF preview" class="hidden" hidden />
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
